<div class="home-container">
  <header class="home-header">
    <h1>Ham Net Logger</h1>
    <div class="user-info">
      <span class="callsign">{{ userService.callsign() }}</span>
      <span class="sync-status" [class]="syncService.statusClass()">
        {{ syncService.statusText() }}
      </span>
      <button mat-icon-button (click)="signOut()" title="Sign Out">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </header>

  <main class="home-content">
    <mat-card class="join-card">
      <mat-card-header>
        <mat-card-title>Join a Net</mat-card-title>
        <mat-card-subtitle>Enter the share code provided by NCS</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <mat-form-field appearance="outline" class="code-field">
          <mat-label>Share Code</mat-label>
          <input
            matInput
            [(ngModel)]="joinCode"
            placeholder="e.g., ABC123"
            (keyup.enter)="joinNet()"
            [disabled]="isJoining"
            maxlength="8"
            style="text-transform: uppercase; font-family: monospace; font-size: 1.25rem; letter-spacing: 0.1em;"
          />
        </mat-form-field>

        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          (click)="joinNet()"
          [disabled]="isJoining || !joinCode.trim()"
        >
          <mat-icon>login</mat-icon>
          Join Net
        </button>
      </mat-card-actions>
    </mat-card>

    @if (userService.isInviter()) {
      <mat-card class="admin-card">
        <mat-card-header>
          <mat-card-title>Administration</mat-card-title>
        </mat-card-header>

        <mat-card-content>
          <p>As an inviter, you can create nets and manage users.</p>
        </mat-card-content>

        <mat-card-actions>
          <button mat-raised-button color="accent" (click)="goToAdmin()">
            <mat-icon>admin_panel_settings</mat-icon>
            Admin Panel
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </main>
</div>
