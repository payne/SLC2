<div class="no-access-container">
  <mat-card class="no-access-card">
    <mat-card-header>
      <mat-icon class="warning-icon">warning</mat-icon>
      <mat-card-title>No Access</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <p>
        You are signed in as <strong>{{ email() }}</strong>, but you don't have
        an invitation to access this system.
      </p>

      <p>
        This application is invite-only. Please contact an existing member to
        request an invitation.
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="signOut()">
        <mat-icon>logout</mat-icon>
        Sign Out
      </button>
    </mat-card-actions>
  </mat-card>
</div>
